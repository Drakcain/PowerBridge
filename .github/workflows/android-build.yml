name: Android Build

on:
workflow_dispatch:
push:
branches:
- main
paths:
- "android/**"
- ".github/workflows/android-build.yml"
- "VERSION"
pull_request:
paths:
- "android/**"
- ".github/workflows/android-build.yml"
- "VERSION"

permissions:
contents: read

concurrency:
group: android-build-${{ github.ref }}
cancel-in-progress: true

jobs:
build:
name: Build Android APKs
runs-on: ubuntu-latest

```
defaults:
  run:
    working-directory: android

steps:
  - name: Checkout
    uses: actions/checkout@v6

  - name: Set up JDK 21
    uses: actions/setup-java@v5
    with:
      distribution: temurin
      java-version: "21"
      cache: gradle

  - name: Make Gradle wrapper executable
    run: chmod +x ./gradlew

  - name: Assemble debug APK
    run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

  - name: Assemble release APK
    # Public CI validates that release builds still compile without private signing material.
    # This does not produce an official signed public release artifact.
    run: ./gradlew :app:assembleRelease --no-daemon --stacktrace
```
