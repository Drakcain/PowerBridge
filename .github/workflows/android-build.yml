name: Android Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'android/**'
      - '.github/workflows/android-build.yml'
      - 'VERSION'
  pull_request:
    paths:
      - 'android/**'
      - '.github/workflows/android-build.yml'
      - 'VERSION'

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Assemble debug
        run: ./gradlew assembleDebug --no-daemon

      - name: Assemble release
        # Public CI validates that release builds still compile without private signing material.
        run: ./gradlew assembleRelease --no-daemon
