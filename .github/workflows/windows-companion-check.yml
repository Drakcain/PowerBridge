name: Windows Companion Check

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: windows-companion
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run companion validation
        run: .\scripts\Test-PowerBridgeCompanion.ps1

      - name: Run CLI smoke test
        run: .\src\PowerBridgeCompanion.ps1 -NoClipboard
