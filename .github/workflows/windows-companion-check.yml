name: Windows Companion Check

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'windows-companion/**'
      - '.github/workflows/windows-companion-check.yml'
      - 'VERSION'
  pull_request:
    paths:
      - 'windows-companion/**'
      - '.github/workflows/windows-companion-check.yml'
      - 'VERSION'

jobs:
  validate:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: windows-companion
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run companion validation
        run: .\scripts\Test-PowerBridgeCompanion.ps1

      - name: Run CLI smoke test
        run: .\src\PowerBridgeCompanion.ps1 -NoClipboard
